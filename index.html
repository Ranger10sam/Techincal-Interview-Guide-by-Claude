<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Samprit's Interview Prep — Complete Study Guide</title>
<link href="https://fonts.googleapis.com/css2?family=Instrument+Serif:ital@0;1&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500;9..40,600;9..40,700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
<style>
:root{
--bg:#0b0d11;--bg2:#10131a;--bg3:#161a24;--bg4:#1c2130;--border:#252b3a;--border2:#333b50;
--t1:#e6e9f0;--t2:#9198ab;--t3:#5d6478;
--acc:#e8a23e;--acc2:rgba(232,162,62,.12);--acc3:#f5c96c;
--grn:#3dd68c;--grn2:rgba(61,214,140,.1);
--blu:#5b9cf6;--blu2:rgba(91,156,246,.1);
--red:#f06060;--red2:rgba(240,96,96,.1);
--pur:#b08df8;--pur2:rgba(176,141,248,.1);
--r:10px;--rs:6px;
}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'DM Sans',sans-serif;background:var(--bg);color:var(--t1);line-height:1.65;overflow-x:hidden}
::-webkit-scrollbar{width:5px}::-webkit-scrollbar-track{background:var(--bg)}::-webkit-scrollbar-thumb{background:var(--border);border-radius:3px}

/* Layout */
.app{display:flex;min-height:100vh}
.sidebar{width:260px;background:var(--bg2);border-right:1px solid var(--border);position:fixed;top:0;left:0;height:100vh;overflow-y:auto;z-index:100;display:flex;flex-direction:column}
.sidebar-header{padding:24px 20px 16px;border-bottom:1px solid var(--border)}
.sidebar-logo{font-family:'Instrument Serif',serif;font-size:20px;color:var(--t1)}
.sidebar-logo em{color:var(--acc);font-style:italic}
.sidebar-sub{font-size:11px;color:var(--t3);margin-top:4px;letter-spacing:.5px;text-transform:uppercase}
.sidebar-nav{flex:1;padding:12px 10px}
.nav-item{display:flex;align-items:center;gap:10px;padding:10px 12px;border-radius:var(--rs);cursor:pointer;transition:all .15s;font-size:13px;font-weight:500;color:var(--t2);margin-bottom:2px;position:relative}
.nav-item:hover{background:var(--bg3);color:var(--t1)}
.nav-item.active{background:var(--acc2);color:var(--acc);font-weight:600}
.nav-item.active::before{content:'';position:absolute;left:0;top:50%;transform:translateY(-50%);width:3px;height:20px;background:var(--acc);border-radius:2px}
.nav-icon{width:28px;height:28px;border-radius:var(--rs);display:flex;align-items:center;justify-content:center;font-size:13px;flex-shrink:0;background:var(--bg3)}
.nav-item.active .nav-icon{background:var(--acc2)}
.nav-progress{font-family:'JetBrains Mono',monospace;font-size:10px;color:var(--t3);margin-left:auto}
.sidebar-footer{padding:16px 20px;border-top:1px solid var(--border);font-size:11px;color:var(--t3)}
.sidebar-footer strong{color:var(--acc);font-weight:600}

.main{margin-left:260px;flex:1;min-height:100vh}
.main-scroll{max-width:820px;margin:0 auto;padding:40px 32px 80px}

/* Page header */
.page-header{margin-bottom:36px}
.page-eyebrow{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--acc);letter-spacing:2px;text-transform:uppercase;margin-bottom:10px}
.page-title{font-family:'Instrument Serif',serif;font-size:clamp(28px,4vw,40px);color:var(--t1);line-height:1.2;margin-bottom:10px}
.page-desc{font-size:14px;color:var(--t2);max-width:600px;line-height:1.7}

/* Progress strip */
.progress-strip{display:flex;align-items:center;gap:14px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);padding:14px 18px;margin-bottom:32px}
.progress-strip-label{font-size:12px;color:var(--t2);white-space:nowrap}
.progress-strip-bar{flex:1;height:6px;background:var(--bg);border-radius:3px;overflow:hidden}
.progress-strip-fill{height:100%;background:linear-gradient(90deg,var(--acc),var(--acc3));border-radius:3px;transition:width .4s ease}
.progress-strip-text{font-family:'JetBrains Mono',monospace;font-size:12px;color:var(--acc);min-width:50px;text-align:right}

/* Q&A Cards */
.qa-card{background:var(--bg2);border:1px solid var(--border);border-radius:var(--r);margin-bottom:12px;overflow:hidden;transition:border-color .2s}
.qa-card:hover{border-color:var(--border2)}
.qa-card.studied{opacity:.5}
.qa-card.studied .qa-q-text{text-decoration:line-through;text-decoration-color:var(--t3)}
.qa-header{display:flex;align-items:flex-start;gap:12px;padding:16px 18px;cursor:pointer;user-select:none}
.qa-check{width:22px;height:22px;border-radius:6px;border:2px solid var(--border);display:flex;align-items:center;justify-content:center;cursor:pointer;transition:all .2s;flex-shrink:0;margin-top:1px;font-size:12px;color:transparent}
.qa-check:hover{border-color:var(--grn)}
.qa-card.studied .qa-check{background:var(--grn);border-color:var(--grn);color:#fff}
.qa-num{font-family:'JetBrains Mono',monospace;font-size:11px;color:var(--t3);min-width:22px;margin-top:3px}
.qa-q-text{flex:1;font-size:14.5px;font-weight:600;color:var(--t1);line-height:1.5}
.qa-expand{font-size:18px;color:var(--t3);transition:transform .2s;margin-top:2px;flex-shrink:0}
.qa-card.open .qa-expand{transform:rotate(180deg)}

.qa-body{max-height:0;overflow:hidden;transition:max-height .35s ease}
.qa-card.open .qa-body{max-height:3000px}
.qa-inner{padding:0 18px 18px;padding-left:70px}

.qa-answer{font-size:13.5px;color:var(--t2);line-height:1.75;margin-bottom:14px}
.qa-answer code{font-family:'JetBrains Mono',monospace;font-size:12px;background:var(--bg4);padding:2px 6px;border-radius:4px;color:var(--acc)}
.qa-answer strong{color:var(--t1);font-weight:600}

.qa-tip{background:var(--acc2);border-left:3px solid var(--acc);border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--acc3);line-height:1.6}
.qa-tip::before{content:'💡 Interview Tip: ';font-weight:700;color:var(--acc)}

.qa-context{background:var(--blu2);border-left:3px solid var(--blu);border-radius:0 var(--rs) var(--rs) 0;padding:10px 14px;margin-bottom:14px;font-size:12.5px;color:var(--t2);line-height:1.6}
.qa-context::before{content:'📖 Deeper Context: ';font-weight:700;color:var(--blu)}
.qa-context a{color:var(--blu);text-decoration:underline;text-underline-offset:2px}
.qa-context a:hover{color:var(--acc)}

.qa-links{display:flex;flex-wrap:wrap;gap:6px}
.qa-link{font-size:11px;font-weight:500;padding:4px 10px;border-radius:14px;background:var(--bg3);color:var(--t2);text-decoration:none;border:1px solid var(--border);transition:all .15s}
.qa-link:hover{border-color:var(--acc);color:var(--acc);background:var(--acc2)}

/* Mobile */
.mobile-toggle{display:none;position:fixed;top:12px;left:12px;z-index:200;width:40px;height:40px;background:var(--bg2);border:1px solid var(--border);border-radius:var(--rs);cursor:pointer;color:var(--t1);font-size:18px;align-items:center;justify-content:center}
.sidebar-close{display:none;position:absolute;top:16px;right:16px;background:none;border:none;color:var(--t2);font-size:20px;cursor:pointer}
@media(max-width:768px){
.sidebar{transform:translateX(-100%);transition:transform .25s ease;width:280px}
.sidebar.open{transform:translateX(0)}
.sidebar-close{display:block}
.mobile-toggle{display:flex}
.main{margin-left:0}
.main-scroll{padding:60px 16px 60px}
.qa-inner{padding-left:18px}
.overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.6);z-index:90}
.overlay.show{display:block}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(10px)}to{opacity:1;transform:translateY(0)}}
.qa-card{animation:fadeIn .3s ease forwards;opacity:0}
</style>

<script>
const DATA=[
{id:"java",title:"Core Java & OOP",icon:"☕",desc:"The foundation every interviewer tests first. Expect 3-4 questions from this category in any technical round. OOP pillars, Collections, Memory Model, and HashMap internals are near-certainties.",questions:[
{q:"What are the 4 pillars of OOP? Explain each.",a:"<strong>Encapsulation</strong> — bundling data + methods together, controlling access via modifiers (private fields, public getters). <strong>Inheritance</strong> — reusing parent class behavior via <code>extends</code>, establishing IS-A relationships. <strong>Polymorphism</strong> — compile-time (method overloading: same name, different params) and runtime (method overriding: subclass redefines parent method, resolved via vtable). <strong>Abstraction</strong> — hiding implementation complexity via abstract classes and interfaces, exposing only what's necessary.",tip:"Always tie each pillar to your own project. For ChefBit: Encapsulation in your service classes, Inheritance if you extended base entities, Polymorphism in your controller method dispatch.",ctx:'The key confusion interviewers catch: <strong>Abstraction vs Encapsulation</strong>. Abstraction is about <em>what</em> to expose (hiding complexity). Encapsulation is about <em>how</em> to protect (access control). A TV remote is abstraction (you don\'t know circuits); the sealed TV casing is encapsulation (you can\'t touch the circuits).',links:[["GeeksforGeeks — OOP in Java","https://www.geeksforgeeks.org/java/four-main-object-oriented-programming-concepts-of-java/"],["Baeldung — OOP Concepts","https://www.baeldung.com/java-oop"]]},

{q:"Difference between Abstract Class and Interface?",a:"<strong>Abstract class:</strong> can have constructors, instance variables, partial implementation; supports single inheritance only. <strong>Interface:</strong> no constructors (pre-Java 8: only abstract methods), supports multiple inheritance, default/static methods since Java 8, private methods since Java 9. Use abstract class for IS-A with shared state; interface for CAN-DO capability contracts.",tip:"Mention Java 8+ default methods and the diamond problem resolution to show you're current. Say: \"Since Java 8, interfaces can have default methods, but abstract classes still win when you need shared state or constructors.\"",ctx:"The <strong>real interview question underneath</strong> is: \"Why does Java prefer interfaces over abstract classes for multiple inheritance?\" Answer: Java avoids the C++ diamond problem. With interfaces, if two interfaces provide conflicting default methods, the implementing class <em>must</em> override to resolve ambiguity — making it explicit, not implicit.",links:[["Baeldung — Interface vs Abstract Class","https://www.baeldung.com/java-interface-vs-abstract-class"],["Baeldung — Java 8 Default Methods","https://www.baeldung.com/java-static-default-methods"]]},

{q:"What is the difference between == and .equals()?",a:"<code>==</code> compares <strong>references</strong> (memory addresses). <code>.equals()</code> compares <strong>content/value</strong> (must be overridden — as in String class). For primitives, <code>==</code> compares values directly. String pool makes <code>\"abc\" == \"abc\"</code> true (same pool reference), but <code>new String(\"abc\") == new String(\"abc\")</code> is <strong>false</strong> (different heap objects).",tip:"Mention the String pool behavior and the hashCode()/equals() contract: if two objects are .equals(), they MUST have the same hashCode(). Reverse isn't necessarily true (collisions exist).",ctx:"<strong>Common trap:</strong> <code>Integer a = 127; Integer b = 127; a == b</code> → <strong>true</strong> (Integer cache: -128 to 127). But <code>Integer a = 128; Integer b = 128; a == b</code> → <strong>false</strong> (outside cache, different objects). This autoboxing edge case catches many candidates.",links:[["Baeldung — == vs .equals()","https://www.baeldung.com/java-equals-method-operator-difference"],["Baeldung — String Pool","https://www.baeldung.com/java-string-pool"]]},

{q:"Explain method overloading vs overriding.",a:"<strong>Overloading:</strong> same method name, different parameter types/count, resolved at <strong>compile-time</strong>, can be in same class. <strong>Overriding:</strong> same method signature in subclass, resolved at <strong>runtime</strong> via dynamic dispatch, needs IS-A relationship, annotated with <code>@Override</code>. Overriding supports <strong>covariant return types</strong> (subclass can return a subtype of the parent's return type) since Java 5.",tip:"The phrase \"compile-time polymorphism vs runtime polymorphism\" is what interviewers want to hear. Add: \"Static methods can be overloaded but not truly overridden — they're hidden.\"",links:[["GeeksforGeeks — Overloading vs Overriding","https://www.geeksforgeeks.org/java/difference-between-method-overloading-and-method-overriding-in-java/"]]},

{q:"String, StringBuilder, and StringBuffer differences?",a:"<strong>String:</strong> immutable, stored in String pool, thread-safe by design. <strong>StringBuilder:</strong> mutable, <strong>not thread-safe</strong>, fastest for single-threaded ops. <strong>StringBuffer:</strong> mutable, <strong>thread-safe</strong> (synchronized methods), slower. For concatenation in loops, always use StringBuilder — String concat creates new objects each iteration.",tip:"Quantify it: \"StringBuilder is ~10x faster than String concatenation in loops because String creates a new object per iteration while StringBuilder modifies in place.\"",ctx:"Under the hood, modern Java compilers (javac) optimize simple string concatenation (<code>\"a\" + \"b\"</code>) into StringBuilder calls. But inside loops, this optimization doesn't help — each iteration creates a new StringBuilder. That's why explicit StringBuilder usage matters in loops.",links:[["Baeldung — String vs StringBuilder vs StringBuffer","https://www.baeldung.com/java-string-builder-string-buffer"]]},

{q:"What are access modifiers in Java?",a:"<strong>private:</strong> class only. <strong>default (package-private):</strong> same package. <strong>protected:</strong> same package + subclasses (even in different packages). <strong>public:</strong> everywhere. Best practice: fields private, expose via getters/setters. This is Encapsulation in practice.",tip:"Relate to your Cognizant work: Salesforce Apex has similar visibility concepts (private, public, global, protected). Show you can draw parallels across ecosystems.",links:[["GeeksforGeeks — Access Modifiers","https://www.geeksforgeeks.org/java/access-modifiers-java/"]]},

{q:"What is the final keyword used for?",a:"<strong>final variable:</strong> value can't be reassigned (for objects, the reference is fixed but object contents can change). <strong>final method:</strong> can't be overridden. <strong>final class:</strong> can't be extended (e.g., String, Integer, wrapper classes). Blank final variables must be initialized in the constructor.",tip:"Connect to immutability: \"final + private fields + no setters = immutable class, which is inherently thread-safe. That's why String is final and immutable.\"",links:[["Baeldung — Final Keyword","https://www.baeldung.com/java-final"]]},

{q:"Explain exception handling in Java.",a:"<code>try-catch-finally</code> and <code>try-with-resources</code> (Java 7+). <strong>Checked exceptions</strong> (IOException — compiler forces handling) vs <strong>Unchecked</strong> (NullPointerException — runtime, extends RuntimeException). Custom exceptions extend Exception or RuntimeException. <code>finally</code> always runs except on <code>System.exit()</code>. Try-with-resources auto-closes <code>AutoCloseable</code> resources.",tip:"Lead with try-with-resources to show modern Java awareness. Mention that Spring's @Transactional catches unchecked exceptions for rollback by default but NOT checked exceptions — this connects Java basics to Spring.",ctx:"<strong>Interview follow-up you should prepare for:</strong> \"When would you create a checked vs unchecked exception?\" Answer: checked for recoverable situations the caller must handle (e.g., FileNotFoundException — the caller can prompt for a different file). Unchecked for programming errors that shouldn't be caught (e.g., NullPointerException — fix the code, don't catch it).",links:[["Baeldung — Exception Handling","https://www.baeldung.com/java-exceptions"],["Baeldung — Try-with-Resources","https://www.baeldung.com/java-try-with-resources"]]},

{q:"What are Generics and why are they used?",a:"Generics provide <strong>compile-time type safety</strong>, eliminating ClassCastException at runtime. <strong>Type erasure</strong> removes generic info at runtime (generics are a compile-time feature). Bounded types: <code>&lt;T extends Comparable&lt;T&gt;&gt;</code>. Wildcards: <code>? extends T</code> (upper bound) for reading, <code>? super T</code> (lower bound) for writing. <strong>PECS: Producer Extends, Consumer Super.</strong>",tip:"Explain PECS with a real example: \"List<? extends Number> — I can READ Numbers out (producer). List<? super Integer> — I can WRITE Integers in (consumer). Collections.sort() uses both.\"",links:[["Baeldung — Generics Interview Questions","https://www.baeldung.com/java-generics-interview-questions"],["Baeldung — PECS Principle","https://www.baeldung.com/java-generics-pecs"]]},

{q:"HashMap vs ConcurrentHashMap differences?",a:"<strong>HashMap:</strong> not thread-safe, allows one null key and null values, O(1) avg operations. <strong>ConcurrentHashMap:</strong> thread-safe via <strong>segment locking</strong> (Java 7) / <strong>CAS + synchronized on node</strong> (Java 8+), no null keys/values, better concurrency than Collections.synchronizedMap(). Internally: array of Nodes, bucket chaining, <strong>treeification at 8 entries</strong> (linked list → red-black tree).",tip:"This is extremely common — know the internals cold. Key numbers to mention: default capacity 16, load factor 0.75, treeify threshold 8, untreeify threshold 6. Explain that Java 8 replaced segment locking with per-bucket synchronization for finer granularity.",ctx:'<strong>Why no null keys in ConcurrentHashMap?</strong> Because in a concurrent context, <code>map.get(key)</code> returning null is ambiguous — does the key not exist, or is the value null? With HashMap (single-threaded) you can disambiguate with <code>containsKey()</code>, but in concurrent access that check-then-act is inherently racy.',links:[["Baeldung — HashMap Guide","https://www.baeldung.com/java-hashmap"],["GFG — HashMap Internals","https://www.geeksforgeeks.org/java/internal-working-of-hashmap-java/"],["Baeldung — ConcurrentHashMap","https://www.baeldung.com/java-concurrent-map"]]},

{q:"Explain Java Memory Model — Stack vs Heap.",a:"<strong>Stack:</strong> thread-specific, stores local variables + method call frames, LIFO, very fast, fixed size (causes StackOverflowError). <strong>Heap:</strong> shared across threads, stores all objects, managed by GC. <strong>String pool</strong> is in heap (moved from PermGen to Metaspace in Java 8). Each thread gets its own stack but shares the heap — this is why concurrent heap access needs synchronization.",tip:"Connect to garbage collection: \"Objects on the heap are GC'd when unreachable. The stack auto-cleans when methods return. Understanding this helps debug memory leaks — leaks happen when heap objects are unintentionally referenced.\"",links:[["Baeldung — Stack vs Heap","https://www.baeldung.com/java-stack-heap"],["Baeldung — JVM Memory Structure","https://www.baeldung.com/java-jvm-memory-structure"]]},

{q:"What are functional interfaces and lambda expressions?",a:"<strong>Functional interface:</strong> exactly one abstract method, annotated with <code>@FunctionalInterface</code>. Built-in examples: Runnable, Comparator, Predicate, Function, Consumer, Supplier. <strong>Lambda:</strong> concise implementation of functional interfaces — <code>(params) -> expression</code>. <strong>Method references:</strong> <code>Class::method</code> shorthand. Enables functional programming style, powers the Streams API.",tip:"Be ready to write a lambda live: \"To sort a list of strings by length: list.sort((a, b) -> a.length() - b.length()) or list.sort(Comparator.comparingInt(String::length))\"",links:[["Baeldung — Lambda Expressions","https://www.baeldung.com/java-8-lambda-expressions-tips"],["Baeldung — Functional Interfaces","https://www.baeldung.com/java-8-functional-interfaces"]]},

{q:"Explain the Collections framework hierarchy.",a:"<code>Iterable → Collection → List</code> (ArrayList, LinkedList), <code>Set</code> (HashSet, TreeSet, LinkedHashSet), <code>Queue</code> (PriorityQueue, ArrayDeque). <strong>Map is separate</strong> (not under Collection): HashMap, TreeMap, LinkedHashMap. <strong>ArrayList:</strong> O(1) random access, O(n) middle insert. <strong>LinkedList:</strong> O(1) insert at ends, O(n) access. <strong>HashSet:</strong> O(1) add/contains, unordered.",tip:"The classic follow-up: \"When would you use LinkedList over ArrayList?\" Answer: Almost never in practice. ArrayList has better cache locality (contiguous memory). LinkedList wins only for frequent insertions/deletions at both ends — and even then, ArrayDeque is usually better.",links:[["GFG — Collections in Java","https://www.geeksforgeeks.org/collections-in-java-2/"],["Baeldung — Choosing the Right Collection","https://www.baeldung.com/java-choose-list-set-queue-map"]]},

{q:"What is the Stream API and how have you used it?",a:"<strong>Stream API</strong> (Java 8+): declarative data processing pipeline. <strong>Intermediate ops</strong> (lazy): filter, map, flatMap, sorted, distinct, peek. <strong>Terminal ops</strong> (trigger execution): forEach, collect, reduce, count, findFirst, anyMatch. Parallel streams for large datasets via <code>.parallelStream()</code>. Collectors: toList, toSet, groupingBy, joining, partitioningBy.",tip:"Have a ChefBit example ready: \"I used streams to filter recipe lists by ingredient availability and dietary preferences — recipes.stream().filter(r -> r.getIngredients().containsAll(userIngredients)).collect(Collectors.toList())\"",links:[["Baeldung — Stream API Tutorial","https://www.baeldung.com/java-8-streams"],["Baeldung — Collectors Guide","https://www.baeldung.com/java-8-collectors"]]}
]},

{id:"spring",title:"Spring Boot & Microservices",icon:"🍃",desc:"Your ChefBit project is a massive advantage here. Every answer should connect back to real decisions you made — DI choices, security implementation, exception handling patterns.",questions:[
{q:"What is Spring Boot and how is it different from Spring?",a:"<strong>Spring Boot</strong> = opinionated Spring setup with auto-configuration, embedded server (Tomcat), starter dependencies, and production-ready features (Actuator). Eliminates XML config. Spring requires manual bean wiring, server deployment, dependency management. <code>@SpringBootApplication</code> = <code>@Configuration</code> + <code>@EnableAutoConfiguration</code> + <code>@ComponentScan</code>.",tip:"Open with: \"My ChefBit backend is built on Spring Boot 3.x. I chose it for auto-configuration — adding spring-boot-starter-web gave me an embedded Tomcat, Jackson for JSON, and a DispatcherServlet without a single XML file.\"",links:[["Marco Behler — Spring Boot Auto-Configuration","https://www.marcobehler.com/guides/spring-boot-autoconfiguration"],["Official Spring Boot Docs","https://docs.spring.io/spring-boot/reference/"]]},

{q:"Explain Dependency Injection and IoC in Spring.",a:"<strong>IoC (Inversion of Control):</strong> framework controls object creation/lifecycle. <strong>DI:</strong> specific form of IoC — dependencies are injected, not created. Types: <strong>Constructor injection</strong> (preferred — immutable, testable, fails fast on missing deps), <strong>Setter injection</strong> (optional dependencies), <strong>Field injection</strong> (@Autowired on fields — convenient but hard to test, hides dependencies). Spring container (ApplicationContext) manages beans via stereotypes: @Component, @Service, @Repository, @Controller.",tip:"Say you prefer constructor injection and explain why: immutability, testability, explicit dependencies. For TaskFlow (your next project), mention you're using constructor injection exclusively — fixing the mixed DI styles from ChefBit.",ctx:"<strong>Why field injection is problematic</strong> (a common follow-up): 1) You can't create the object without Spring (no way to pass dependencies manually in tests). 2) Dependencies are hidden — you must read the source to know what a class needs. 3) It encourages too many dependencies (no constructor pain to signal the class is doing too much).",links:[["Baeldung — Why Field Injection Is Bad","https://www.baeldung.com/java-spring-field-injection-cons"],["Baeldung — Constructor Injection","https://www.baeldung.com/constructor-injection-in-spring"]]},

{q:"What are the different bean scopes in Spring?",a:"<strong>singleton</strong> (default — one per container), <strong>prototype</strong> (new instance per request), <strong>request</strong> (one per HTTP request), <strong>session</strong> (one per HTTP session), <strong>application</strong> (one per ServletContext). Singleton is default and sufficient for stateless services.",tip:"Mention the singleton+prototype gotcha: injecting a prototype bean into a singleton gives you the SAME prototype instance every time. Solutions: use ObjectProvider<T>, @Lookup method, or Provider<T> from javax.inject.",links:[["Baeldung — Bean Scopes","https://www.baeldung.com/spring-bean-scopes"]]},

{q:"How does Spring Boot auto-configuration work?",a:"<code>@EnableAutoConfiguration</code> triggers scanning of <code>META-INF/spring/org.springframework.boot.autoconfigure.AutoConfiguration.imports</code> (Spring Boot 3) or <code>spring.factories</code> (Boot 2). <strong>Conditional annotations</strong> decide which configs apply: <code>@ConditionalOnClass</code>, <code>@ConditionalOnMissingBean</code>, <code>@ConditionalOnProperty</code>. Example: if <code>spring-boot-starter-web</code> is on classpath, auto-configures DispatcherServlet, Jackson, Tomcat.",tip:"\"I override auto-config in ChefBit via application.properties — for example, setting server.port, database connection properties, and JWT secret. For custom beans, I define a @Configuration class that takes precedence over auto-config due to @ConditionalOnMissingBean.\"",links:[["Marco Behler — Auto-Config Deep Dive","https://www.marcobehler.com/guides/spring-boot-autoconfiguration"]]},

{q:"@RestController vs @Controller difference?",a:"<code>@Controller</code> returns view names (for MVC/Thymeleaf). <code>@RestController</code> = <code>@Controller</code> + <code>@ResponseBody</code> — every method returns data serialized to JSON/XML directly. <code>@ResponseBody</code> tells Spring to use <strong>HttpMessageConverter</strong> (Jackson for JSON). In REST APIs like ChefBit, always use @RestController.",tip:"Tie to ChefBit: \"All my API controllers use @RestController since the React Native client consumes JSON. I use @RequestBody for deserializing incoming JSON to DTOs and Spring's Jackson auto-config handles serialization.\"",links:[["Baeldung — @Controller vs @RestController","https://www.baeldung.com/spring-controller-vs-restcontroller"]]},

{q:"How do you handle exceptions in Spring Boot?",a:"<code>@ControllerAdvice</code> + <code>@ExceptionHandler</code> for <strong>global handling</strong>. <code>@ResponseStatus</code> to map exceptions to HTTP codes. Custom exception classes (e.g., ResourceNotFoundException). <code>ResponseEntityExceptionHandler</code> for overriding defaults. Return consistent error DTOs with timestamp, message, status, path.",tip:"Describe your actual pattern: \"In ChefBit, I have a GlobalExceptionHandler class with @ControllerAdvice that catches ResourceNotFoundException (404), ValidationException (400), and a generic fallback (500). Each returns a standardized ErrorResponse DTO.\"",ctx:"<strong>For TaskFlow</strong>, you're planning to implement <code>@ControllerAdvice</code> with centralized exception handling from day one — fixing the inconsistent error responses in ChefBit. Mention this as a specific improvement you're making.",links:[["Baeldung — Error Handling for REST","https://www.baeldung.com/exception-handling-for-rest-with-spring"]]},

{q:"What is Spring Security and how did you implement JWT auth?",a:"Spring Security: filter chain-based security framework. <strong>JWT flow:</strong> User sends credentials → Server validates → Returns signed JWT → Client sends JWT in Authorization header → <strong>JwtAuthFilter</strong> (extends OncePerRequestFilter) extracts/validates token → Sets <strong>SecurityContextHolder</strong> → Request proceeds. Components: JwtAuthFilter, UserDetailsService, SecurityFilterChain bean. RBAC via <code>@PreAuthorize</code> or role-based requestMatchers.",tip:"Walk through your ChefBit flow: \"User registers with phone number, receives OTP, verifies → server generates JWT with userId and role in payload. Every subsequent request includes the JWT in the Authorization: Bearer header. My JwtAuthFilter validates the signature and expiry before setting the authentication context.\"",ctx:"<strong>Know these component names</strong> — interviewers test exact terminology: <strong>OncePerRequestFilter</strong> (base class for your JWT filter), <strong>SecurityContextHolder</strong> (holds the Authentication object for the current thread), <strong>UserDetailsService</strong> (loads user data by username), <strong>PasswordEncoder</strong> (BCrypt for hashing).",links:[["BezKoder — JWT Auth Tutorial","https://www.bezkoder.com/spring-boot-jwt-authentication/"],["Baeldung — Spring Security","https://www.baeldung.com/security-spring"]]},

{q:"What are Microservices? How do they differ from Monoliths?",a:"<strong>Microservices:</strong> independently deployable services, each owning its data, communicating via REST/messaging. <strong>Monolith:</strong> single deployable unit. Benefits: independent scaling, tech diversity, fault isolation, team autonomy. Challenges: distributed transactions, network latency, operational complexity, data consistency. <strong>Use when team/domain complexity justifies the overhead.</strong>",tip:"Be honest: \"ChefBit is a modular monolith — one Spring Boot app with clean package separation. For its scale (900+ users), microservices would be over-engineering. I'd consider splitting if the recipe generation service needed independent scaling due to high-latency GPT API calls.\"",links:[["Microservices.io — Pattern Catalog","https://microservices.io/patterns/"],["Martin Fowler — Microservices","https://martinfowler.com/articles/microservices.html"]]},

{q:"How do microservices communicate?",a:"<strong>Synchronous:</strong> REST (HTTP), gRPC (binary, faster). <strong>Asynchronous:</strong> Message queues (RabbitMQ, Kafka) for event-driven architecture. <strong>API Gateway</strong> (Spring Cloud Gateway) for routing, rate limiting, auth. <strong>Service discovery</strong> (Eureka/Consul) for dynamic endpoints. <strong>Circuit breaker</strong> (Resilience4j) for fault tolerance. Prefer async for non-blocking operations.",tip:"Even if you haven't used all patterns, frame it architecturally: \"If I were to split ChefBit, the recipe generation service would communicate asynchronously via a message queue since GPT API calls are high-latency — I wouldn't want the main request thread blocked.\"",links:[["Microservices.io — Communication Patterns","https://microservices.io/patterns/communication-style/"]]},

{q:"Explain the Spring Bean lifecycle.",a:"<strong>Instantiation</strong> → <strong>Dependency Injection</strong> → BeanNameAware → BeanFactoryAware → <strong>BeanPostProcessor (pre-init)</strong> → <code>@PostConstruct</code> → InitializingBean.afterPropertiesSet() → custom init-method → <strong>BeanPostProcessor (post-init)</strong> → Bean ready → <code>@PreDestroy</code> → DisposableBean.destroy() → Garbage collected.",tip:"You don't need every step memorized. Focus on: \"Instantiation → DI → @PostConstruct → Ready → @PreDestroy. @PostConstruct is my preferred init hook because it's clean, annotation-based, and runs after all dependencies are injected.\"",links:[["Reflectoring — Bean Lifecycle","https://reflectoring.io/spring-bean-lifecycle/"],["Baeldung — Bean Lifecycle","https://www.baeldung.com/spring-bean"]]},

{q:"What is Spring Data JPA and how do you use it?",a:"Abstraction over JPA/Hibernate. Extend <code>JpaRepository&lt;Entity, ID&gt;</code> for CRUD + paging + sorting. Query methods by naming convention (<code>findByNameAndAge</code>). <code>@Query</code> for custom JPQL/native SQL. <code>@Transactional</code> for atomic operations. <strong>N+1 problem:</strong> solve with <code>@EntityGraph</code> or <code>JOIN FETCH</code>. Pagination: Pageable param + Page&lt;T&gt; return.",tip:"Connect to ChefBit: \"I use Spring Data JPA with PostgreSQL. My RecipeRepository extends JpaRepository and uses derived query methods like findByUserIdOrderByCreatedAtDesc. I've handled the N+1 problem with @EntityGraph on recipe-ingredient relationships.\"",ctx:"<strong>The N+1 problem explained simply:</strong> If you load 10 users and each has recipes, JPA fires 1 query for users + 10 queries for each user's recipes = 11 queries. Fix: <code>JOIN FETCH</code> loads everything in 1 query. Vlad Mihalcea's article (linked) is the definitive resource on this.",links:[["Vlad Mihalcea — N+1 Problem","https://vladmihalcea.com/n-plus-1-query-problem/"],["Baeldung — Spring Data JPA","https://www.baeldung.com/the-persistence-layer-with-spring-data-jpa"]]},

{q:"How do you handle distributed transactions in microservices?",a:"<strong>Saga Pattern:</strong> sequence of local transactions with compensating actions on failure. <strong>Choreography:</strong> services emit events, others react. <strong>Orchestration:</strong> central coordinator directs flow. Two-Phase Commit (2PC) is blocking and rarely used. <strong>Eventual consistency</strong> is preferred. <strong>Outbox pattern</strong> for reliable event publishing (write to DB + outbox table atomically, separate process publishes events).",tip:"Even if you haven't implemented sagas, explain the concept confidently: \"If ChefBit's payment service fails after the subscription service succeeded, the saga's compensating transaction would cancel the subscription. This ensures consistency without distributed locking.\"",links:[["Microservices.io — Saga Pattern","https://microservices.io/patterns/data/saga.html"]]}
]},

{id:"rest",title:"REST API & System Design",icon:"🌐",desc:"Increasingly tested even at mid-level. You won't face FAANG-level design, but REST principles and one simple system design scenario are common at 10-15 LPA.",questions:[
{q:"What are REST principles?",a:"<strong>Stateless</strong> (no server-side session), <strong>Client-Server</strong> separation, <strong>Uniform Interface</strong> (URIs for resources, HTTP verbs), <strong>Cacheable</strong>, <strong>Layered System</strong>. HTTP methods: GET (read), POST (create), PUT (full update), PATCH (partial), DELETE. Status codes: 200 OK, 201 Created, 204 No Content, 400 Bad Request, 401 Unauthorized, 403 Forbidden, 404 Not Found, 409 Conflict, 500 Internal Server Error.",tip:"Know ALL common status codes. A classic gotcha: \"What's the difference between 401 and 403?\" — 401 means not authenticated (who are you?), 403 means not authorized (I know who you are, but you can't access this).",ctx:"<strong>HATEOAS</strong> (Hypermedia as the Engine of Application State) is the often-forgotten REST constraint. In practice, most APIs aren't truly RESTful — they're \"REST-ish.\" Knowing this distinction shows architectural maturity. Your ChefBit API is pragmatic REST (resource-based URLs, proper HTTP methods) without full HATEOAS — and that's fine for this level.",links:[["Stack Overflow Blog — REST API Best Practices","https://stackoverflow.blog/2020/03/02/best-practices-for-rest-api-design/"]]},

{q:"How do you version a REST API?",a:"<strong>URI versioning:</strong> <code>/api/v1/users</code> (most common, your ChefBit approach). <strong>Header versioning:</strong> <code>Accept: application/vnd.api.v1+json</code>. <strong>Query param:</strong> <code>/users?version=1</code>. Best practice: URI versioning for simplicity. Never break existing clients. Deprecation strategy: run old + new simultaneously, communicate sunset timeline.",tip:"\"In ChefBit I use URI versioning with /api/v1/ prefix because it's the most explicit and cacheable approach. If I needed v2, I'd run both versions simultaneously and deprecate v1 after clients migrate.\"",links:[["Baeldung — REST API Versioning","https://www.baeldung.com/rest-versioning"]]},

{q:"How would you design a URL shortener? (System Design)",a:"<strong>Functional:</strong> shorten URL, redirect, analytics. <strong>Non-functional:</strong> low latency, high availability. <strong>Design:</strong> Hash using Base62 of auto-increment ID (or MD5 first 7 chars). Storage: key-value store (Redis for cache + DB for persistence). Read-heavy (100:1 ratio) → heavy caching. <strong>Scale:</strong> consistent hashing for distributed cache, DB sharding by hash prefix. Expiration: TTL in Redis + cleanup CRON job.",tip:"Practice drawing this on paper. Structure your answer: requirements → estimation → high-level design → deep dive → scaling. For 10-15 LPA, showing you can think through components systematically matters more than getting every detail perfect.",links:[["ByteByteGo — URL Shortener Design","https://bytebytego.com/courses/system-design-interview/design-a-url-shortener"]]},

{q:"How do you handle API rate limiting?",a:"Algorithms: <strong>Token Bucket</strong> (allows bursts), <strong>Sliding Window</strong> (smooth), <strong>Fixed Window</strong> (simple but edge-burst problem). Implement via API Gateway or middleware. Headers: <code>X-RateLimit-Limit</code>, <code>X-RateLimit-Remaining</code>, <code>Retry-After</code>. Store counters in Redis (atomic INCR). Return <strong>429 Too Many Requests</strong>.",tip:"\"In ChefBit, rate limiting the GPT API calls was critical to control costs. I'd implement a Token Bucket algorithm backed by Redis — it handles burst traffic well while maintaining an average rate.\"",links:[["AlgoMaster — Rate Limiting Algorithms","https://blog.algomaster.io/p/rate-limiting-algorithms-explained-with-code"]]},

{q:"What is an API Gateway and why use it?",a:"Single entry point for all microservices. Handles: routing, authentication, rate limiting, load balancing, request/response transformation, circuit breaking, logging. Examples: Spring Cloud Gateway, Kong, AWS API Gateway. Reduces client complexity — client talks to one endpoint instead of N services.",tip:"\"Even in ChefBit's monolithic architecture, I have a logical API gateway pattern — all requests go through a common filter chain (auth, logging, CORS) before reaching controllers. In a microservices split, this would become a physical API Gateway.\"",links:[["Microservices.io — API Gateway","https://microservices.io/patterns/apigateway.html"]]},

{q:"Explain CORS and how you've handled it.",a:"<strong>Cross-Origin Resource Sharing:</strong> browser security blocking requests to different origins (protocol + domain + port). Preflight OPTIONS request for non-simple requests. In Spring Boot: <code>@CrossOrigin</code> on controller, or global <code>WebMvcConfigurer.addCorsMappings()</code>, or <code>CorsFilter</code> bean. Allow specific origins in production, <strong>never use allowAll(*) with credentials</strong>.",tip:"\"My React Native app needed proper CORS config to communicate with the Spring Boot backend. I configured allowed origins, methods, and headers in a WebMvcConfigurer bean rather than using @CrossOrigin on every controller — centralized config is cleaner.\"",links:[["MDN — CORS Explained","https://developer.mozilla.org/en-US/docs/Web/HTTP/Guides/CORS"],["Baeldung — CORS with Spring","https://www.baeldung.com/spring-cors"]]},

{q:"How would you design a notification system?",a:"<strong>Architecture:</strong> Notification Service receives events → <strong>Priority Queue</strong> (Kafka/RabbitMQ) → Channel-specific workers (Push Worker, Email Worker, SMS Worker). Deduplication via idempotency keys. Retry with <strong>exponential backoff</strong>. User preferences stored in DB. Template engine for message formatting. Track delivery status per channel.",tip:"\"In ChefBit, I integrated Firebase Cloud Messaging for push notifications. If I designed this at scale, I'd decouple notification dispatch from the main request flow using a message queue — the API just enqueues the notification event and returns immediately.\"",links:[["ByteByteGo — Notification System","https://blog.bytebytego.com/p/design-a-notification-system"]]},

{q:"What is database sharding and when would you use it?",a:"Splitting data across multiple DB instances. <strong>Horizontal sharding:</strong> distribute rows (by user_id hash, geography). <strong>Vertical sharding:</strong> split tables into different DBs. Benefits: better write throughput, larger storage capacity. Challenges: cross-shard queries, rebalancing, join complexity. <strong>Start with read replicas before sharding</strong> — shard only when single DB can't handle write load.",tip:"Lead with pragmatism: \"Start simple — single DB, then add read replicas, then shard when necessary. ChefBit uses a single PostgreSQL instance which handles 900+ users easily. I'd consider sharding only at 100K+ users with heavy write loads.\"",links:[["DigitalOcean — Database Sharding","https://www.digitalocean.com/community/tutorials/understanding-database-sharding"]]}
]},

{id:"sql",title:"SQL & Database",icon:"🗃️",desc:"Most service companies include a SQL round. Expect live query writing (joins, aggregations, window functions), plus theory on indexing, normalization, and ACID properties.",questions:[
{q:"What are different types of SQL joins?",a:"<strong>INNER JOIN:</strong> only matching rows in both tables. <strong>LEFT JOIN:</strong> all left rows + matching right (NULL if no match). <strong>RIGHT JOIN:</strong> opposite of LEFT. <strong>FULL OUTER JOIN:</strong> all rows from both, NULLs where no match. <strong>CROSS JOIN:</strong> cartesian product. <strong>SELF JOIN:</strong> table joined with itself (e.g., employee-manager hierarchy: <code>SELECT e.name, m.name FROM emp e JOIN emp m ON e.manager_id = m.id</code>).",tip:"Be ready to write any join on paper. The SELF JOIN for employee-manager hierarchy is a classic service-company question — practice it until automatic.",links:[["Coding Horror — Visual SQL Joins","https://blog.codinghorror.com/a-visual-explanation-of-sql-joins/"],["SQLBolt — Interactive Practice","https://sqlbolt.com/"]]},

{q:"Explain normalization and its forms.",a:"<strong>1NF:</strong> atomic values, no repeating groups. <strong>2NF:</strong> 1NF + no partial dependency (all non-key attrs depend on FULL PK). <strong>3NF:</strong> 2NF + no transitive dependency (non-key doesn't depend on another non-key). <strong>BCNF:</strong> every determinant is a candidate key. <strong>Denormalization:</strong> intentionally adding redundancy for read performance.",tip:"Mention your ChefBit schema: \"My recipes table is in 3NF — recipe_id determines all attributes directly, with ingredients in a separate table linked via a junction table. I denormalized the recipe card view by caching ingredient counts to avoid expensive JOINs on the listing endpoint.\"",links:[["GFG — Normal Forms","https://www.geeksforgeeks.org/normal-forms-in-dbms/"]]},

{q:"What are indexes and when should you use them?",a:"<strong>B-tree index</strong> (default): speeds up lookups from O(n) to O(log n). Types: single column, <strong>composite</strong> (left-to-right rule), unique, partial, covering. Use on: WHERE/JOIN/ORDER BY columns, foreign keys. Avoid on: small tables, low cardinality columns, heavily updated columns. Trade-off: <strong>faster reads, slower writes, more storage</strong>. Use <code>EXPLAIN ANALYZE</code> to verify.",tip:"Lead with EXPLAIN ANALYZE — it shows systematic thinking. \"Before adding an index, I always run EXPLAIN ANALYZE to confirm the query is doing a sequential scan. After adding the index, I verify it's being used and measure the improvement.\"",ctx:"<strong>Composite index left-to-right rule:</strong> an index on (A, B, C) can be used for queries filtering on A, or A+B, or A+B+C — but NOT B alone or C alone. This is called the <strong>leftmost prefix rule</strong> and is one of the most commonly tested index concepts.",links:[["Use The Index, Luke","https://use-the-index-luke.com/"],["Baeldung — Database Indexes","https://www.baeldung.com/jpa-indexes"]]},

{q:"Write a query: Find the 2nd highest salary.",a:"<strong>Method 1 (subquery):</strong> <code>SELECT MAX(salary) FROM employee WHERE salary < (SELECT MAX(salary) FROM employee)</code><br><strong>Method 2 (LIMIT/OFFSET):</strong> <code>SELECT salary FROM employee ORDER BY salary DESC LIMIT 1 OFFSET 1</code><br><strong>Method 3 (DENSE_RANK — best):</strong> <code>SELECT salary FROM (SELECT salary, DENSE_RANK() OVER (ORDER BY salary DESC) as rnk FROM employee) t WHERE rnk = 2</code>",tip:"DENSE_RANK is the most flexible — works for any Nth value and handles duplicates correctly. RANK would skip numbers on ties; DENSE_RANK doesn't. Know the difference between RANK, DENSE_RANK, and ROW_NUMBER.",links:[["LeetCode — Second Highest Salary","https://leetcode.com/problems/second-highest-salary/"]]},

{q:"Difference between WHERE and HAVING?",a:"<strong>WHERE:</strong> filters rows BEFORE grouping (can't use aggregate functions). <strong>HAVING:</strong> filters groups AFTER GROUP BY (CAN use aggregates). SQL execution order: <strong>FROM → WHERE → GROUP BY → HAVING → SELECT → ORDER BY → LIMIT</strong>.",tip:"Know the full execution order — it's a frequently asked standalone question. Write it down before the interview. The key insight: \"WHERE happens before GROUP BY, so it can't see aggregates. HAVING happens after, so it can.\"",ctx:"<strong>Example combining both:</strong> <code>SELECT dept, COUNT(*) as cnt FROM emp WHERE salary > 50000 GROUP BY dept HAVING COUNT(*) > 5 ORDER BY cnt DESC</code> — this first filters individual employees by salary (WHERE), groups by department, then keeps only departments with more than 5 high-earners (HAVING).",links:[["SQLBolt — SQL Execution Order","https://sqlbolt.com/lesson/select_queries_order_of_execution"]]},

{q:"Explain ACID properties.",a:"<strong>Atomicity:</strong> all or nothing — transaction fully completes or fully rolls back. <strong>Consistency:</strong> DB moves from one valid state to another (constraints satisfied). <strong>Isolation:</strong> concurrent transactions don't interfere. Levels: READ UNCOMMITTED → READ COMMITTED → REPEATABLE READ → SERIALIZABLE. <strong>Durability:</strong> committed data survives crashes (WAL — Write-Ahead Logging).",tip:"Connect to Spring: \"In Spring Boot, @Transactional provides atomicity — if any exception occurs, the entire transaction rolls back. By default, it only rolls back on unchecked exceptions. For checked exceptions, you need @Transactional(rollbackFor = Exception.class).\"",links:[["Engineering At Scale — ACID Explained","https://engineeringatscale.substack.com/p/acid-properties-databases-explained"]]},

{q:"Stored procedures vs functions?",a:"<strong>Procedure:</strong> can modify data (INSERT/UPDATE/DELETE), doesn't require a return value, called with CALL, can have IN/OUT/INOUT params. <strong>Function:</strong> must return a value, can be used in SELECT statements, generally intended for computation. Both are precompiled for performance. In PostgreSQL, functions can do nearly everything procedures can.",tip:"If asked about Salesforce comparison: \"In Apex, triggers are analogous to stored procedures — they run on DML events. SOQL functions like COUNT() and SUM() mirror SQL aggregate functions.\"",links:[["PostgreSQL Docs — Functions","https://www.postgresql.org/docs/current/sql-createfunction.html"]]},

{q:"How do you optimize a slow SQL query?",a:"1. Run <strong>EXPLAIN ANALYZE</strong> to find the bottleneck. 2. Add appropriate indexes (composite for multi-column WHERE). 3. <strong>Avoid SELECT *</strong> — select only needed columns. 4. Rewrite subqueries as JOINs where possible. 5. Use pagination (LIMIT/OFFSET or keyset pagination). 6. Avoid functions on indexed columns in WHERE (kills index usage). 7. Consider materialized views for complex aggregations.",tip:"Lead with EXPLAIN ANALYZE — it shows a systematic, measurable approach. \"I don't guess at optimization. I run EXPLAIN ANALYZE, identify if it's a sequential scan, missing index, or inefficient join, then make targeted changes and measure again.\"",links:[["Use The Index, Luke — WHERE Clause","https://use-the-index-luke.com/sql/where-clause"],["PostgreSQL — EXPLAIN","https://www.postgresql.org/docs/current/using-explain.html"]]}
]},

{id:"behavioral",title:"Behavioral & Situational",icon:"🎯",desc:"Don't underestimate these — they're often the deciding factor between equally qualified candidates. Service companies at 10-15 LPA weigh cultural fit heavily. Use STAR format throughout.",questions:[
{q:"Tell me about yourself.",a:"\"I'm a backend-focused software engineer with ~2 years at Cognizant building enterprise solutions for healthcare clients like Abbott and Zoetis using Salesforce/Apex. Outside work, I built and launched <strong>ChefBit</strong> — an AI recipe app on the Google Play Store (900+ downloads) using Spring Boot, PostgreSQL, JWT auth, and React Native. I'm looking to transition into a pure Java/Spring Boot role where I can deepen my backend engineering skills and work on product-focused teams.\"",tip:"Keep it under 90 seconds. Structure: Past (Cognizant) → Present (ChefBit + transition) → Future (Java backend growth). The interviewer is deciding whether to like you in the first 60 seconds — be warm, concise, and confident.",links:[]},

{q:"Why do you want to leave Cognizant / your current role?",a:"\"I've learned a lot about enterprise development, Agile processes, and working with large codebases. However, my current role is heavily Salesforce/Apex-focused, and my passion is in <strong>core backend engineering with Java and Spring Boot</strong> — as reflected in ChefBit. I want a role where I can grow deeper in this stack and contribute to product engineering rather than platform customization.\"",tip:"NEVER badmouth Cognizant. Frame it as moving TOWARD something (Java backend), not AWAY from something (Salesforce). If pressed on the 90-day notice period, say you're prepared and willing to negotiate with your current employer.",links:[]},

{q:"Tell me about a challenging bug you fixed.",a:"<strong>Situation:</strong> At Cognizant, we had a critical production issue where automated workflows were firing duplicate actions for Abbott. <strong>Task:</strong> Identify root cause and fix without disrupting live users. <strong>Action:</strong> I traced it to a trigger recursion problem — a before-update trigger was indirectly causing an after-update trigger to re-fire. I implemented a static boolean flag pattern to prevent recursion and added comprehensive unit tests. <strong>Result:</strong> Zero duplicate actions after deployment, and the pattern became our team's standard for trigger guard clauses.",tip:"Use STAR format rigorously. Quantify the result: \"This was part of the 25+ production bugs I resolved, earning me a 5/5 performance rating.\"",links:[]},

{q:"Describe a project you're most proud of.",a:"\"<strong>ChefBit</strong> — I built it end-to-end: Spring Boot backend with JWT auth, PostgreSQL schema for complex relational data (users, recipes, ingredients, preferences), REST APIs for the mobile client, integration with GPT APIs for AI recipe generation, Firebase push notifications, Google Play subscription verification with CRON-based renewal checks, and a gamification system (coins + streaks). Launched on Play Store and got <strong>900+ downloads in the first month</strong>.\"",tip:"Show ownership, technical depth, and measurable impact. The fact that it's LIVE on the Play Store with real users differentiates you from 95% of candidates who only have tutorial projects.",links:[]},

{q:"How do you handle disagreements with team members?",a:"\"I focus on data and shared goals. During sprint planning at Cognizant, a colleague and I disagreed on a schema migration approach. I proposed we both prototype for 2 hours and compare. Their solution turned out to be more performant — I learned something, and we shipped the better solution. I focus on the best outcome rather than being right.\"",tip:"The key message: you're collaborative, ego-free, and outcome-driven. Never describe a disagreement where you were 100% right and the other person was wrong — it makes you look uncoachable.",links:[]},

{q:"Where do you see yourself in 3-5 years?",a:"\"In 3 years, I want to be a strong mid-level/senior backend engineer who can independently design and deliver scalable systems. In 5 years, I'd like to be making technical decisions for a team — whether as a tech lead or senior engineer mentoring juniors. I'm especially interested in distributed systems and cloud-native architecture.\"",tip:"Align with realistic growth at THEIR company. For a service company: emphasize becoming a technical asset to client delivery. For a product company: emphasize product ownership and system design maturity.",links:[]},

{q:"What are your salary expectations?",a:"\"For a Java backend role at this level with my experience and the current market, I'm looking in the <strong>10-15 LPA range</strong>. I'm flexible based on the overall package — growth opportunities, tech stack, learning culture, and team quality matter to me as well. I'd love to understand the band you have for this role.\"",tip:"Research the exact range on Glassdoor/Levels.fyi/AmbitionBox before EVERY interview. Defer if possible: \"What's the budgeted range for this position?\" If they insist on a number first, give a researched range, not a single number.",links:[]},

{q:"Do you have any questions for us?",a:"1. \"What does the tech stack look like and what's the team's approach to technical debt?\" 2. \"How are engineering decisions made — top-down or do ICs have input?\" 3. \"What does onboarding look like for new engineers?\" 4. \"What's the biggest engineering challenge the team is currently facing?\"",tip:"ALWAYS have 3-4 thoughtful questions. Never say 'no.' Bad questions: salary/leave policy (too early), generic questions about the company you could Google. Good questions show you're evaluating THEM as much as they're evaluating you.",links:[]}
]},

{id:"dsa",title:"DSA Essentials",icon:"⚡",desc:"Service companies test basic-to-medium DSA. Arrays, strings, HashMaps, sorting, and linked lists cover 80%+ of what's asked. Focus on explaining your approach, not just coding.",questions:[
{q:"Explain time complexity — O(1), O(n), O(log n), O(n log n), O(n²).",a:"<strong>O(1):</strong> constant — HashMap.get(). <strong>O(log n):</strong> halving — binary search. <strong>O(n):</strong> linear — array scan. <strong>O(n log n):</strong> efficient sorts — merge sort, Arrays.sort(). <strong>O(n²):</strong> nested loops — bubble sort. Space complexity matters too: recursion uses O(call depth) stack space. <strong>Amortized O(1):</strong> ArrayList.add() — usually O(1) but occasionally O(n) on resize, averages to O(1).",tip:"Be ready to analyze your own solutions. When solving any DSA problem, always state time AND space complexity before the interviewer asks. It shows you think about efficiency automatically.",links:[["freeCodeCamp — Big O Cheat Sheet","https://www.freecodecamp.org/news/big-o-cheat-sheet-time-complexity-chart/"],["bigocheatsheet.com","https://www.bigocheatsheet.com/"]]},

{q:"Reverse a linked list (iterative and recursive).",a:"<strong>Iterative:</strong> Three pointers — <code>prev=null, curr=head, next</code>. While curr != null: <code>next=curr.next; curr.next=prev; prev=curr; curr=next</code>. Return prev.<br><strong>Recursive:</strong> Base case: head==null || head.next==null → return head. Recurse on head.next. Then: <code>head.next.next=head; head.next=null</code>. Time O(n), Space O(1) iterative / O(n) recursive.",tip:"Practice writing this from memory — it's the single most asked linked list question. Draw the pointer movements on paper: [1->2->3] becomes [null<-1<-2<-3]. The key insight: you're just flipping each arrow direction.",links:[["LeetCode #206","https://leetcode.com/problems/reverse-linked-list/"]]},

{q:"Two Sum — find two numbers that add to target.",a:"<strong>Brute force:</strong> nested loops O(n²). <strong>Optimal:</strong> HashMap — iterate once, for each num check if <code>(target-num)</code> exists in map, else store <code>num → index</code>. Time O(n), Space O(n). Key: <strong>check-before-insert</strong> pattern (check if complement exists, THEN insert current number).",tip:"Start with brute force, then optimize — show your thought process. Remember the mistake from your mock: store the INDEX as the value, not the frequency. And it's a single-loop solution — check first, then insert, within the same loop.",ctx:"<strong>Sorted array variant:</strong> use two pointers from both ends. If sum < target, move left pointer right. If sum > target, move right pointer left. O(n) time, O(1) space. Know both approaches — interviewers sometimes ask for the no-extra-space version.",links:[["LeetCode #1","https://leetcode.com/problems/two-sum/"]]},

{q:"How does binary search work? When can you use it?",a:"Requires <strong>sorted</strong> input. Compare middle element with target: if equal → found; if target < mid → search left half; if target > mid → search right half. <code>low=0, high=n-1, mid=low+(high-low)/2</code> (avoids integer overflow). Time <strong>O(log n)</strong>. Use for: sorted arrays, finding boundaries, and <strong>search space problems</strong> (minimum capacity, kth element, etc).",tip:"Mention 'search space' pattern — it shows you understand binary search beyond arrays. Example: \"Find the minimum speed to eat all bananas in H hours\" — binary search on the answer space.",links:[["LeetCode #704","https://leetcode.com/problems/binary-search/"]]},

{q:"Explain BFS vs DFS with use cases.",a:"<strong>BFS:</strong> level-by-level using Queue. Use for: shortest path (unweighted graphs), level-order traversal, nearest neighbor problems. <strong>DFS:</strong> go deep first using Stack/recursion. Use for: cycle detection, topological sort, path existence, connected components, maze solving. BFS space O(width of tree), DFS space O(height). Both time O(V+E) for graphs.",tip:"Know when to use which — that's what interviewers test. Rule of thumb: BFS for shortest/minimum problems, DFS for existence/counting problems. Both work for traversal and connected components.",links:[["Striver — BFS/DFS","https://takeuforward.org/graph/breadth-first-search-bfs-level-order-traversal/"]]},

{q:"What is a HashMap internally? How does it handle collisions?",a:"Array of buckets (<code>Node&lt;K,V&gt;[]</code>). <code>hash(key) & (capacity-1)</code> → bucket index. <strong>Collision handling:</strong> chaining (linked list in bucket) → <strong>treeification</strong> to red-black tree at 8 entries (Java 8+, untreeify at 6). Load factor 0.75 → resize (double capacity, rehash all entries). <strong>hashCode() and equals() contract:</strong> equal objects must have same hashCode. Default capacity 16.",tip:"This is asked in almost every Java interview. Know the key numbers: capacity 16, load factor 0.75, treeify threshold 8, untreeify 6. Explain the hash function: Java 8 uses the key's hashCode XOR'd with itself shifted right 16 bits to spread bits evenly.",links:[["GFG — HashMap Internals","https://www.geeksforgeeks.org/java/internal-working-of-hashmap-java/"]]},

{q:"Find if a string has all unique characters.",a:"<strong>Method 1:</strong> HashSet — add each char, if add() returns false → duplicate. O(n) time, O(n) space. <strong>Method 2:</strong> boolean[128] for ASCII. <strong>Method 3:</strong> Bit manipulation — use int as 26-bit flag for lowercase. <strong>Method 4:</strong> Sort then check adjacent — O(n log n), O(1) space. Always ask: is it ASCII or Unicode?",tip:"Asking \"Is it ASCII or Unicode?\" before coding is what separates good candidates from great ones. It shows you think about constraints before jumping to code. The bit manipulation approach impresses at this level.",links:[["LeetCode #217","https://leetcode.com/problems/contains-duplicate/"]]},

{q:"Detect a cycle in a linked list.",a:"<strong>Floyd's Tortoise and Hare:</strong> slow pointer (1 step), fast pointer (2 steps). If they meet → cycle. To find cycle start: reset one pointer to head, move both at 1 step — they meet at cycle entry. Time O(n), Space <strong>O(1)</strong>. Alternative: HashSet of visited nodes — O(n) time and space.",tip:"Know Floyd's algorithm — it's elegant and the O(1) space is what makes it interview-worthy. The \"find cycle start\" follow-up is common — practice the mathematical proof if asked why it works.",links:[["LeetCode #141","https://leetcode.com/problems/linked-list-cycle/"]]},

{q:"Common sorting algorithms and their complexities?",a:"<strong>Bubble:</strong> O(n²), stable. <strong>Selection:</strong> O(n²), unstable. <strong>Insertion:</strong> O(n²) worst / O(n) best, stable, good for small/nearly-sorted. <strong>Merge Sort:</strong> O(n log n), stable, O(n) space. <strong>Quick Sort:</strong> O(n log n) avg / O(n²) worst, in-place. <strong>Heap Sort:</strong> O(n log n), in-place, unstable. Java's <code>Arrays.sort()</code>: dual-pivot quicksort for primitives, <strong>TimSort</strong> for objects.",tip:"Know what Java uses internally: TimSort for objects (hybrid merge+insertion sort, optimized for partially sorted data). When asked \"which sort would you use?\", the answer is: \"I'd use Arrays.sort() or Collections.sort() — they use TimSort which is optimal for real-world data.\"",links:[["Toptal — Sorting Animations","https://www.toptal.com/developers/sorting-algorithms"],["bigocheatsheet.com","https://www.bigocheatsheet.com/"]]},

{q:"Stack vs Queue — explain with real-world use cases.",a:"<strong>Stack (LIFO):</strong> browser back button, undo operations, expression evaluation, DFS, call stack. <strong>Queue (FIFO):</strong> BFS, task scheduling, print queue, message queues (Kafka/RabbitMQ). <strong>Deque:</strong> both ends — sliding window problems. <strong>PriorityQueue:</strong> heap-based ordering. In modern Java: use <strong>ArrayDeque</strong> over Stack class (legacy) and over LinkedList for Queue.",tip:"\"In Java, I use ArrayDeque for both stack and queue operations — it's faster than the legacy Stack class and more efficient than LinkedList. For priority-based processing, PriorityQueue backed by a min-heap.\"",links:[["Baeldung — ArrayDeque vs LinkedList","https://www.baeldung.com/java-array-deque"]]}
]},

{id:"react",title:"React & Frontend",icon:"⚛️",desc:"Your Scaler Academy React training + ChefBit's React Native frontend make this relevant. Expect 2-3 React questions if the role involves any frontend work. Focus on hooks and state management.",questions:[
{q:"What is the Virtual DOM and how does React use it?",a:"Virtual DOM is a lightweight in-memory representation of the real DOM. On state change: React creates new VDOM → <strong>diffs against previous VDOM</strong> (reconciliation via diffing algorithm) → batches <strong>minimal updates</strong> to real DOM. This is faster because real DOM operations are expensive (trigger reflow/repaint). React's <strong>Fiber architecture</strong> (React 16+) enables incremental rendering and priority-based updates.",tip:"Mention Fiber if asked about React 16+ internals. The key phrase: \"React batches DOM updates and applies only the minimum necessary changes — this is why it's efficient.\"",links:[["React Docs — Reconciliation","https://legacy.reactjs.org/docs/reconciliation.html"]]},

{q:"Explain React hooks and their lifecycle equivalents.",a:"<code>useState</code> (local state), <code>useEffect</code> (side effects — mount/update/unmount), <code>useContext</code> (global context), <code>useMemo</code> (memoize expensive computations), <code>useCallback</code> (memoize function references), <code>useRef</code> (mutable ref that persists across renders). <strong>useEffect(fn, [])</strong> = componentDidMount. <strong>useEffect return fn</strong> = componentWillUnmount.",tip:"Focus on hooks — class components are legacy. Be ready to write a useEffect with cleanup: \"useEffect(() => { const sub = subscribe(); return () => sub.unsubscribe(); }, [])\"",links:[["React Docs — Hooks","https://react.dev/reference/react/hooks"]]},

{q:"Context API vs Redux for state management?",a:"<strong>Context:</strong> built-in, good for low-frequency updates (theme, auth, locale). <strong>Redux:</strong> external store, for complex state logic, time-travel debugging, middleware. Context re-renders ALL consumers on any change; Redux allows selective subscriptions via useSelector. For ChefBit: auth state in Context, recipe data via API calls with local state.",tip:"\"In ChefBit's React Native app, I use Context for auth state (user token, login status) and local useState for component-level data. I didn't need Redux because my server is the single source of truth — the app fetches fresh data via REST APIs.\"",links:[["React Docs — Context","https://react.dev/learn/passing-data-deeply-with-context"]]},

{q:"React Native vs React.js — key differences?",a:"<strong>React.js:</strong> renders to browser DOM (div, span, p). <strong>React Native:</strong> renders to native platform components (View → UIView/android.view, Text → UILabel/TextView). <strong>No CSS</strong> — uses StyleSheet with Flexbox. Navigation via React Navigation (not React Router). Platform-specific code with <code>Platform.OS</code>. Same React concepts (hooks, state, props) apply.",tip:"You built ChefBit with React Native — own it: \"The core React mental model (components, props, state, hooks) is identical. The main differences are styling (StyleSheet instead of CSS), navigation (React Navigation stack/tab navigators), and using native modules for device APIs like camera and push notifications.\"",links:[["React Native Docs","https://reactnative.dev/docs/getting-started"]]},

{q:"Props vs State in React?",a:"<strong>Props:</strong> passed from parent, read-only in child, trigger re-render when changed. <strong>State:</strong> owned by component, mutable via useState, local by default. Data flows down (props), events flow up (callback functions). <strong>Lifting state up:</strong> move shared state to nearest common ancestor. Avoid duplicating state that can be derived from props.",tip:"Keep the answer simple and example-driven: \"In ChefBit, a RecipeCard receives recipe data as props from the RecipeList parent. But the 'liked' toggle is local state within the card — it changes independently of the parent.\"",links:[]},

{q:"useEffect pitfalls and common mistakes?",a:"<code>useEffect(callback, deps)</code>: no deps → every render; <code>[]</code> → mount only; <code>[dep1]</code> → when dep changes. <strong>Pitfalls:</strong> 1) <strong>Stale closures</strong> — using state/props from a previous render. 2) <strong>Infinite loops</strong> — object/array in deps (recreated every render). 3) <strong>Missing cleanup</strong> — subscriptions/timers leak. 4) <strong>Async directly as callback</strong> — wrap in inner async function.",tip:"The stale closure pitfall is a very common interview question. Example: \"If I reference a count state variable inside a setInterval in useEffect, the interval captures the initial count value and never sees updates. Fix: use a ref, or use the functional setState form: setCount(prev => prev + 1).\"",links:[["React Docs — useEffect","https://react.dev/reference/react/useEffect"]]}
]},

{id:"git",title:"Git & Agile & Tools",icon:"🔧",desc:"The 'soft-technical' questions that close out interviews. Service companies routinely ask about Git workflow, branching strategy, and Agile ceremonies — especially for candidates joining existing teams.",questions:[
{q:"What is your Git workflow?",a:"<strong>Feature branch workflow:</strong> main → develop → feature/JIRA-123-description. PR with code review (min 1 reviewer). Squash merge to keep history clean. Rebase feature branch on develop before PR. CI runs on PR (tests, lint). Hotfix branches from main for production issues. Interactive rebase (<code>git rebase -i</code>) to clean up commits before PR.",tip:"Connect to Cognizant: \"At Cognizant, we follow feature branch workflow with Jira-linked branch names. Every PR requires at least one code review, and we squash merge to keep the develop branch history clean. I use interactive rebase to consolidate WIP commits before raising a PR.\"",links:[["Atlassian — Feature Branch Workflow","https://www.atlassian.com/git/tutorials/comparing-workflows/feature-branch-workflow"]]},

{q:"Explain git merge vs git rebase.",a:"<strong>Merge:</strong> creates a merge commit, preserves branch history (non-linear graph). <strong>Rebase:</strong> replays your commits on top of the target branch, producing linear history. Use rebase for feature branches (clean history), merge for main/develop (preserve context). <strong>Golden Rule: never rebase public/shared branches</strong> — it rewrites commit hashes that others may have based work on.",tip:"\"I use rebase to keep my feature branch up-to-date with develop: git checkout feature && git rebase develop. Before the PR, I do git rebase -i to squash WIP commits into logical units. Then the PR is merged (not rebased) into develop.\"",links:[["Atlassian — Merging vs Rebasing","https://www.atlassian.com/git/tutorials/merging-vs-rebasing"]]},

{q:"How does your Agile/Scrum process work?",a:"2-week sprints. <strong>Sprint Planning:</strong> pick from prioritized backlog, estimate with story points (Fibonacci). <strong>Daily Standup:</strong> what I did, what I'll do, blockers. <strong>Sprint Review:</strong> demo to stakeholders. <strong>Sprint Retrospective:</strong> what went well, what to improve. Jira for tracking: story → subtasks → PR → code review → QA → done. At Cognizant, worked in a 10-person team.",tip:"Mention specific ceremonies and your contribution. \"During sprint planning, I actively participated in estimation — breaking stories into technical subtasks and flagging dependencies. In retros, I once proposed automating our deployment checklist which reduced release errors.\"",links:[]},

{q:"What is CI/CD and have you used it?",a:"<strong>CI:</strong> automatically build and test on every commit/PR. <strong>CD:</strong> automatically deploy passing builds to staging/production. Pipeline: code push → build → unit tests → integration tests → deploy to staging → smoke tests → production. Tools: Jenkins, GitHub Actions, GitLab CI, CircleCI.",tip:"Even basic experience counts. \"At Cognizant, our CI pipeline ran unit tests and static analysis on every PR. For ChefBit, I used basic GitHub Actions for build verification. In TaskFlow, I plan to set up a complete pipeline with automated tests and Docker deployment.\"",links:[["GitHub — Actions Quickstart","https://docs.github.com/en/actions/quickstart"]]},

{q:"How do you approach code reviews?",a:"I look for: <strong>correctness</strong> (does it solve the problem?), <strong>readability</strong> (clear naming, structure), <strong>edge cases</strong>, <strong>performance</strong> implications, <strong>test coverage</strong>, <strong>security</strong> (no hardcoded secrets, SQL injection). I give constructive feedback with suggestions, not just criticism. I also learn from reviewing others' code.",tip:"\"At Cognizant, code reviews were mandatory for all PRs. I review for both obvious issues and subtle ones — like checking if a new database query could cause N+1 problems, or if error handling covers edge cases. I frame suggestions as questions: 'Would it make sense to add a null check here?' rather than 'This is wrong.'\"",links:[["Google — Code Review Best Practices","https://google.github.io/eng-practices/review/reviewer/"]]}
]}
];

// State
let currentPage=0;
let studied=new Set();
try{const s=localStorage.getItem('ip_studied');if(s)studied=new Set(JSON.parse(s))}catch(e){}
function save(){try{localStorage.setItem('ip_studied',JSON.stringify([...studied]))}catch(e){}}

function totalQ(){return DATA.reduce((a,t)=>a+t.questions.length,0)}

function renderNav(){
const nav=document.getElementById('sidebarNav');
nav.innerHTML=DATA.map((t,i)=>{
const done=t.questions.filter((_,qi)=>studied.has(t.id+'-'+qi)).length;
return`<div class="nav-item ${i===currentPage?'active':''}" onclick="goTo(${i})"><div class="nav-icon">${t.icon}</div>${t.title}<span class="nav-progress">${done}/${t.questions.length}</span></div>`;
}).join('');
document.getElementById('globalCount').textContent=studied.size;
document.getElementById('globalTotal').textContent=totalQ();
}

function renderPage(){
const t=DATA[currentPage];
const done=t.questions.filter((_,qi)=>studied.has(t.id+'-'+qi)).length;
let h=`<div class="page-header"><div class="page-eyebrow">Topic ${currentPage+1} of ${DATA.length}</div><h1 class="page-title">${t.icon} ${t.title}</h1><p class="page-desc">${t.desc}</p></div>`;
h+=`<div class="progress-strip"><span class="progress-strip-label">Section progress</span><div class="progress-strip-bar"><div class="progress-strip-fill" style="width:${t.questions.length?done/t.questions.length*100:0}%"></div></div><span class="progress-strip-text">${done}/${t.questions.length}</span></div>`;
t.questions.forEach((q,qi)=>{
const key=t.id+'-'+qi;
const isSt=studied.has(key);
h+=`<div class="qa-card ${isSt?'studied':''}" style="animation-delay:${qi*.04}s" id="card-${key}">`;
h+=`<div class="qa-header" onclick="toggleCard('${key}')">`;
h+=`<div class="qa-check" onclick="event.stopPropagation();toggleStudied('${key}')">${isSt?'✓':''}</div>`;
h+=`<span class="qa-num">${qi+1}</span>`;
h+=`<div class="qa-q-text">${q.q}</div>`;
h+=`<span class="qa-expand">▾</span></div>`;
h+=`<div class="qa-body"><div class="qa-inner">`;
h+=`<div class="qa-answer">${q.a}</div>`;
if(q.tip)h+=`<div class="qa-tip">${q.tip}</div>`;
if(q.ctx)h+=`<div class="qa-context">${q.ctx}</div>`;
if(q.links&&q.links.length){
h+=`<div class="qa-links">`;
q.links.forEach(l=>{h+=`<a class="qa-link" href="${l[1]}" target="_blank" rel="noopener">📄 ${l[0]}</a>`;});
h+=`</div>`;}
h+=`</div></div></div>`;
});
document.getElementById('mainContent').innerHTML=h;
}

function goTo(i){currentPage=i;renderNav();renderPage();window.scrollTo(0,0);if(window.innerWidth<769)toggleSidebar();}
function toggleCard(key){document.getElementById('card-'+key).classList.toggle('open')}
function toggleStudied(key){if(studied.has(key))studied.delete(key);else studied.add(key);save();renderNav();renderPage();}
function toggleSidebar(){document.getElementById('sidebar').classList.toggle('open');document.getElementById('overlay').classList.toggle('show');}

renderNav();renderPage();
</script>
</body>
</html>
